<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sebastian Garay — GRC & Behavioral Security</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700;800&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    /* ── Reset ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    /* ── Reduced motion ──────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }

    /* ── Tokens ────────────────────────────────────── */
    :root {
      --bg:        #050c13;
      --bg2:       #06101a;
      --surface:   #0a1829;
      --card:      #0c1e30;
      --accent:    #00d4ff;
      --accent-rgb: 0, 212, 255;
      --text:      #c0dce8;
      --text-bright:#eaf6fb;
      --border:    rgba(0, 212, 255, 0.1);
      --fh: 'Syne', sans-serif;
      --fb: 'IBM Plex Sans', sans-serif;
      --fm: 'JetBrains Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--fb);
      line-height: 1.65;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Selection ─────────────────────────────────── */
    ::selection {
      background: rgba(0, 212, 255, 0.2);
      color: var(--text-bright);
    }

    /* ── Scrollbar ─────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: rgba(0,212,255,0.18); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(0,212,255,0.35); }

    /* ── Root mount ────────────────────────────────── */
    #root { min-height: 100vh; }

    /* ── Keyframes ─────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0);    }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
    @keyframes scrollPulse {
      0%   { opacity: 0.45; transform: scaleY(1) translateY(0);   }
      50%  { opacity: 0.9;  transform: scaleY(1.18) translateY(3px); }
      100% { opacity: 0.45; transform: scaleY(1) translateY(0);   }
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes rippleAnim {
      to { transform: scale(1); opacity: 0; }
    }
    @keyframes dotPulse {
      0%, 100% { transform: scale(1);   opacity: 0.6; }
      50%      { transform: scale(2.4); opacity: 0;   }
    }
    /* Mobile hamburger */
    @media (max-width: 768px) {
      .hamburger-btn { display: flex !important; }
      nav > div > a[href^="#"],
      nav > div > div:not(.hamburger-btn) { display: none !important; }
    }

    /* ── Global link reset ─────────────────────────── */
    a { color: inherit; }

    /* ── Responsive helpers ────────────────────────── */
    @media (max-width: 1024px) {
      /* About grid stacks */
      #about   .two-col { grid-template-columns: 1fr !important; }
      #contact .two-col { grid-template-columns: 1fr !important; }
    }
    @media (max-width: 768px) {
      #education .deg-grid   { grid-template-columns: 1fr !important; }
      nav { padding: 0 24px !important; }
      nav .nav-links { display: none !important; }
      .hero-text { padding: 0 24px !important; }
      section { padding-left: 0 !important; }
      .container-pad { padding: 0 24px !important; }
    }

    /* ── Tweaks panel backdrop ─────────────────────── */
    .tweaks-panel-backdrop { display: none; }

    /* ── Print: full-page PDF capture ──────────────── */
    @page { size: 1280px 1656px; margin: 0; }
    @media print {
      * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      html, body { overflow: visible !important; width: 1280px; }
      /* Freeze entrance animations at end state */
      *, *::before, *::after {
        animation-delay: -99s !important; animation-duration: .001s !important;
        animation-iteration-count: 1 !important; animation-fill-mode: both !important;
        animation-play-state: running !important; transition-duration: 0s !important;
      }
      /* Keep cards/figures from splitting across pages */
      section { break-inside: auto; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="loading-screen.jsx"></script>
  <script type="text/babel" src="dynamic-island.jsx"></script>
  <script type="text/babel" src="dashboard-bg.jsx"></script>
  <script type="text/babel" src="sections.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>

  <script>
    addEventListener('load', () => {
      const wait = (ms) => new Promise((r) => setTimeout(r, ms));
      const waitFor = (cond, timeout = 8000) => new Promise((res) => {
        const t0 = Date.now();
        const iv = setInterval(() => { if (cond() || Date.now() - t0 > timeout) { clearInterval(iv); res(); } }, 100);
      });
      (async () => {
        // 1. Wait for React to mount the hero
        await waitFor(() => document.getElementById('hero'));
        // 2. Wait for the loading screen (z-index 9900) to finish & unmount
        await waitFor(() => ![...document.querySelectorAll('div')].some((d) => d.style && d.style.zIndex === '9900'));
        await wait(400);
        // 3. Scroll through the whole page so every reveal/IntersectionObserver fires
        const step = Math.round(window.innerHeight * 0.8);
        for (let y = 0; y <= document.body.scrollHeight; y += step) { window.scrollTo(0, y); await wait(110); }
        window.scrollTo(0, 0);
        await wait(450);
        // 4. Hide fixed chrome (navbar, social island, progress bar, tweaks)
        document.querySelectorAll('body *').forEach((el) => { if (getComputedStyle(el).position === 'fixed') el.style.display = 'none'; });
        // 5. Wait for fonts + images
        try { await document.fonts.ready; } catch (e) {}
        const imgs = [...document.images].filter((i) => !i.complete);
        await Promise.race([Promise.allSettled(imgs.map((i) => i.decode())), wait(8000)]);
        await wait(500);
        window.print();
      })();
    });
  </script>
</body>
</html>
