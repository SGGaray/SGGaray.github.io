  <style>
    /* ── Reset ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    /* ── Reduced motion ──────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }

    /* ── Tokens ────────────────────────────────────── */
    :root {
      --bg:        #050c13;
      --bg2:       #06101a;
      --surface:   #0a1829;
      --card:      #0c1e30;
      --accent:    #00d4ff;
      --accent-rgb: 0, 212, 255;
      --text:      #c0dce8;
      --text-bright:#eaf6fb;
      --border:    rgba(0, 212, 255, 0.1);
      --fh: 'Syne', sans-serif;
      --fb: 'IBM Plex Sans', sans-serif;
      --fm: 'JetBrains Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--fb);
      line-height: 1.65;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Selection ─────────────────────────────────── */
    ::selection {
      background: rgba(0, 212, 255, 0.2);
      color: var(--text-bright);
    }

    /* ── Scrollbar ─────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: rgba(0,212,255,0.18); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(0,212,255,0.35); }

    /* ── Root mount ────────────────────────────────── */
    #root { min-height: 100vh; }

    /* ── Keyframes ─────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0);    }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
    @keyframes scrollPulse {
      0%   { opacity: 0.45; transform: scaleY(1) translateY(0);   }
      50%  { opacity: 0.9;  transform: scaleY(1.18) translateY(3px); }
      100% { opacity: 0.45; transform: scaleY(1) translateY(0);   }
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes rippleAnim {
      to { transform: scale(1); opacity: 0; }
    }
    @keyframes dotPulse {
      0%, 100% { transform: scale(1);   opacity: 0.6; }
      50%      { transform: scale(2.4); opacity: 0;   }
    }
    @keyframes tickerScroll {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }
    /* Mobile hamburger */
    @media (max-width: 768px) {
      .hamburger-btn { display: flex !important; }
      nav > div > a[href^="#"],
      nav > div > div:not(.hamburger-btn) { display: none !important; }
    }

    /* ── Global link reset ─────────────────────────── */
    a { color: inherit; }

    /* ── Responsive helpers ────────────────────────── */
    @media (max-width: 1024px) {
      /* About grid stacks */
      #about   .two-col { grid-template-columns: 1fr !important; }
      #contact .two-col { grid-template-columns: 1fr !important; }
    }
    @media (max-width: 920px) {
      .hero-grid { grid-template-columns: 1fr !important; gap: 44px !important; }
    }
    @media (max-width: 768px) {
      .footer-grid { grid-template-columns: 1fr !important; gap: 40px !important; }
    }
    @media (max-width: 768px) {
      #education .deg-grid   { grid-template-columns: 1fr !important; }
      nav { padding: 0 24px !important; }
      .hero-text { padding: 0 24px !important; }
      section { padding-left: 0 !important; }
      .container-pad { padding: 0 24px !important; }
    }

    /* ── Focus visible ──────────────────────────────── */
    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
      border-radius: 4px;
    }
    :focus:not(:focus-visible) { outline: none; }

    /* ── Rich focus state for interactive inputs ──────── */
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(var(--accent-rgb), 0.15);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    /* ── Universal card hover lift (cards without inline hover) ── */
    .hcard { transition: transform 0.25s ease, border-color 0.25s ease; }
    .hcard:hover {
      transform: translateY(-3px) !important;
      border-color: rgba(var(--accent-rgb), 0.32) !important;
    }
    @media (hover: none) {
      .hcard:active {
        transform: translateY(-3px) !important;
        border-color: rgba(var(--accent-rgb), 0.32) !important;
      }
    }

    /* ── Contact: stack links on mobile ───────────────── */
    @media (max-width: 768px) {
      .contact-links { flex-direction: column !important; align-items: stretch !important; }
      .contact-links .contact-sep { display: none !important; }
      .hero-left { margin-top: calc(60px + 2rem) !important; }
    }

    /* ── Tweaks panel backdrop ─────────────────────── */
    .tweaks-panel-backdrop { display: none; }

    /* ── Short viewports: keep hero CTAs clear of the ticker ── */
    @media (max-height: 700px) {
      #hero { align-items: flex-start !important; padding-top: 88px; }
    }

    /* ── Touch devices: :active fallback for cards that rely on :hover ── */
    @media (hover: none) {
      #projects article:active,
      #contact a:active { transform: translateY(-2px); }
    }
